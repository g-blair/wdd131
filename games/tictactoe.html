<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<link rel="stylesheet" href="tictactoe.css">
</head>

<body>
<header>
    <img class="logo" src="images/tictactoe.png" alt="Tic Tac Toe Logo">
</header>

<h1>Tic Tac Toe</h1>

<div id="board">
    <div class="cell"></div>
    <div class="cell"></div>

    <div class="cell"></div>
    <div class="cell"></div>

<p id="status">Player X's turn</p>
<button onclick="restartGame()">Restart</button>

<script src="tictactoe.js"></script>
</body>
</html>
