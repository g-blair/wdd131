<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Book</title>
  <link rel="stylesheet" href="recipes.css" />
  <script src="recipes.js" defer></script>
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/recipe-book.png" alt="Recipe Logo">
            <h1>RecipeBook</h1>
        </div>

        <div class="search-bar">
            <input type="text" id="search" placeholder="Find a recipe">
            <button>🔍</button>
        </div>
    </header>

  <main id="recipe-container">
    <article class="recipe-card">
      <img src="images/apple-crisp.jpg" alt="Apple Crisp">

      <div class="recipe-content">
        <span class="tag">dessert</span>
        <h2>Apple Crisp</h2>

        <div class="stars">
          ★★★★☆
        </div>

        <p>
          This apple crisp recipe is a simple yet delicious fall dessert
          that’s great served warm with vanilla ice cream.
        </p>
      </div>
    </article>
  </main>

  <footer>
    <p>Recipe icons created by Freepik - Flaticon</p>
  </footer>

</body>
</html>
